<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pigmentdatabas för Konstnärer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎨 Pigmentdatabas</h1>
            <p class="subtitle">Sök på pigmentkod (t.ex. PR254) eller namn</p>
        </header>

        <!-- Sökfält -->
        <div class="search-section">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Sök pigment (t.ex. PR254, Kadmiumröd, PY150)..."
                autocomplete="off"
            >
            <button onclick="searchPigments()" id="searchBtn">Sök</button>
        </div>

        <!-- Filter-sektion -->
        <div class="filters">
            <h3>Filter</h3>
            <div class="filter-options">
                <div class="filter-group">
                    <label>Färgfamilj:</label>
                    <select id="colorFamilyFilter">
                        <option value="alla">Alla</option>
                        <option value="Röd">Röd</option>
                        <option value="Blå">Blå</option>
                        <option value="Gul">Gul</option>
                        <option value="Grön">Grön</option>
                        <option value="Brun">Brun</option>
                        <option value="Svart">Svart</option>
                        <option value="Vit">Vit</option>
                        <option value="Jordfärg">Jordfärg</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label>Ljusäkthet:</label>
                    <select id="lightfastnessFilter">
                        <option value="alla">Alla</option>
                        <option value="I">I - Utmärkt</option>
                        <option value="II">II - Bra</option>
                        <option value="III">III - Måttlig</option>
                    </select>
                </div>
            </div>
            <button onclick="applyFilters()" class="filter-btn">Applicera filter</button>
        </div>

        <!-- Resultatområde -->
        <div id="results" class="results-container">
            <p class="hint">⬆️ Börja sök ovan för att se pigment ⬆️</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
